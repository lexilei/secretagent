llm:
  model: claude-haiku-4-5-20251001

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: murder_workflow
  result_dir: results
  entry_point: answer_question

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: 4

# Zero-shot (default): raw_answer -> extract_index
# answer_question is direct, calls raw_answer (simulate) + extract_index (match_choice)
#
# Workflow override:
#   evaluate.entry_point=answer_question_workflow
#
# Agent loop override:
#   ptools.answer_question.method=program_of_thought
ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: match_choice
  extract_evidence:
    method: simulate
  deduce_answer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
