# Best-of-N CoT: N LLM calls (fixed), pick majority vote
# Uses self_consistency factory with inner simulate
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: murder_best_of_5
  result_dir: results
  entry_point: answer_question

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: null

ptools:
  raw_answer:
    method: self_consistency
    inner_method: simulate
    n_samples: 5
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
