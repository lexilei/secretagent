# Naive ReAct: no tools, pure reasoning loop
# The agent can only think and produce an answer — no ptools available
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: murder_react_naive
  result_dir: results
  entry_point: answer_question
  record_details: true

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: 75

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: react
    max_steps: 10
    tools: []
  answer_question_workflow:
    method: direct
