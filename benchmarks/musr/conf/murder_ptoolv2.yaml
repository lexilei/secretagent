# Ptools v2 (ours): 3 LLM calls (fixed)
# Evidence-centric pipeline: extract -> verify -> deduce
# This is the primary method under study
llm:
  model: claude-haiku-4-5-20251001

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: murder_ptoolv2
  result_dir: results
  entry_point: answer_question_workflow
  record_details: true

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: null

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: direct
