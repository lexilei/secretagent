# Self-Consistency: majority vote over N workflow runs
# Applies self_consistency at the workflow level
llm:
  model: claude-haiku-4-5-20251001

cachier:
  cache_dir: llm_cache

evaluate:
  expt_name: murder_self_consistency_5
  result_dir: results
  entry_point: answer_question_workflow

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: null

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: direct
  answer_question_workflow:
    method: self_consistency
    inner_method: direct
    n_samples: 5
