# ReAct baseline: variable LLM calls (open-ended agent loop)
# Thought -> Action -> Observation loop with tool use
llm:
  model: claude-haiku-4-5-20251001

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: murder_react
  result_dir: results
  entry_point: answer_question
  record_details: true

dataset:
  split: murder_mysteries
  shuffle_seed: 42
  n: null

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_suspects_and_evidence:
    method: simulate
  verify_alibis:
    method: simulate
  deduce_murderer:
    method: simulate
  answer_question:
    method: react
    max_steps: 10
  answer_question_workflow:
    method: direct
