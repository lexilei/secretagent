llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache
  enable_caching: false

evaluate:
  expt_name: td_react
  result_dir: results
  entry_point: answer_question
  record_details: true

dataset:
  split: true_detective
  shuffle_seed: 42
  n: null

ptools:
  raw_answer:
    method: simulate
  extract_index:
    method: simulate
  extract_clues_and_suspects:
    method: simulate
  verify_and_cross_reference:
    method: simulate
  deduce_guilty:
    method: simulate
  answer_question:
    method: react
    max_steps: 10
  answer_question_workflow:
    method: direct
