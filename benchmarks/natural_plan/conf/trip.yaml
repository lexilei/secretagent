# Use Together AI (set TOGETHERAI_API_KEY or TOGETHER_API_KEY)
llm:
  model: together_ai/deepseek-ai/DeepSeek-V3.1

cachier:
  cache_dir: llm_cache

evaluate:
  result_dir: results
  expt_name: DEFAULT
  entry_point: trip_planning
  prompt_trace: true

dataset:
  split: trip
  shuffle_seed: 42
  prompt_mode: 0shot
  n: 4
  stratified: false
  sample_n: 50
  sample_seed: 42

ptools:
  extract_constraints:
    method: simulate
    example_file: examples/trip.json
  solve_problem:
    method: simulate
    example_file: examples/trip.json
  format_answer:
    method: simulate
    example_file: examples/trip.json
  trip_planning:
    method: DEFAULT
